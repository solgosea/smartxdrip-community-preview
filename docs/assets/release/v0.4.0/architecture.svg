<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">Solgo Insight v0.4.0 Community Preview Architecture</title>
  <desc id="desc">A technical architecture diagram showing data sources, sync and storage, analysis engines, plugin UI, and shared surfaces for the Solgo Insight community preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5FAF6"/>
      <stop offset="0.48" stop-color="#EEF6F2"/>
      <stop offset="1" stop-color="#F8FBF8"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12392F"/>
      <stop offset="1" stop-color="#071D18"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4EDC89"/>
      <stop offset="1" stop-color="#1D9D67"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DFF5EB"/>
      <stop offset="1" stop-color="#BEEAD5"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E7F2FF"/>
      <stop offset="1" stop-color="#C9E2FF"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF2D2"/>
      <stop offset="1" stop-color="#FFE0A3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#16362B" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#16362B" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4C6B5D"/>
    </marker>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .title { font-size: 42px; font-weight: 760; fill: #0F2F27; letter-spacing: 0; }
      .subtitle { font-size: 19px; fill: #5B7469; letter-spacing: 0; }
      .hero-title { font-size: 42px; font-weight: 760; fill: #F6FFF9; letter-spacing: 0; }
      .hero-subtitle { font-size: 19px; fill: #C7E6D5; letter-spacing: 0; }
      .layer-title { font-size: 19px; font-weight: 760; fill: #12392F; letter-spacing: 0; }
      .layer-caption { font-size: 13px; fill: #6D8278; letter-spacing: 0; }
      .card-title { font-size: 17px; font-weight: 740; fill: #12392F; letter-spacing: 0; }
      .card-text { font-size: 13px; fill: #557064; letter-spacing: 0; }
      .tiny { font-size: 11px; fill: #6E847A; letter-spacing: 0; }
      .white-title { font-size: 18px; font-weight: 760; fill: #F5FFF9; letter-spacing: 0; }
      .white-text { font-size: 12px; fill: #BEE4D0; letter-spacing: 0; }
      .pill { font-size: 12px; font-weight: 700; fill: #164438; letter-spacing: 0; }
      .line { stroke: #4C6B5D; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #8EAB9D; stroke-width: 1.7; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 7; }
      .box { fill: #FFFFFF; stroke: #D9E9E0; stroke-width: 1.4; filter: url(#softShadow); }
      .layer { fill: rgba(255,255,255,0.72); stroke: #D4E5DC; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg)"/>

  <g class="font">
    <rect x="70" y="58" width="1460" height="130" rx="28" fill="url(#dark)" filter="url(#shadow)"/>
    <circle cx="116" cy="116" r="26" fill="url(#green)"/>
    <path d="M104 119 C112 103, 119 132, 127 112 C131 103, 137 105, 141 113" fill="none" stroke="#073522" stroke-width="4" stroke-linecap="round"/>
    <text x="160" y="112" class="hero-title">Solgo Insight v0.4.0 Community Preview</text>
    <text x="160" y="150" class="hero-subtitle">Host + plugin architecture for CGM data review, glance surfaces, local alerts, and episode analysis</text>
    <text x="1315" y="98" class="white-text">Public scope</text>
    <rect x="1305" y="112" width="154" height="34" rx="17" fill="#E6FFF0" opacity="0.95"/>
    <text x="1325" y="134" class="pill">v0.4.0 focused</text>
  </g>

  <g class="font">
    <rect x="86" y="235" width="280" height="430" rx="24" class="layer"/>
    <text x="116" y="275" class="layer-title">Data Sources</text>
    <text x="116" y="299" class="layer-caption">User-configured CGM data inputs</text>

    <rect x="116" y="335" width="220" height="88" rx="18" fill="url(#blue)" stroke="#C4DAEF" stroke-width="1.4" filter="url(#softShadow)"/>
    <text x="140" y="370" class="card-title">xDrip+ Local</text>
    <text x="140" y="396" class="card-text">Fast local readings</text>

    <rect x="116" y="455" width="220" height="88" rx="18" fill="url(#blue)" stroke="#C4DAEF" stroke-width="1.4" filter="url(#softShadow)"/>
    <text x="140" y="490" class="card-title">Nightscout API</text>
    <text x="140" y="516" class="card-text">Historical cloud data</text>

    <rect x="116" y="575" width="220" height="54" rx="16" fill="#FFFFFF" stroke="#D9E9E0" stroke-width="1.3"/>
    <text x="140" y="608" class="card-text">No account required by app</text>
  </g>

  <g class="font">
    <rect x="430" y="235" width="330" height="430" rx="24" class="layer"/>
    <text x="460" y="275" class="layer-title">Sync &amp; Storage Layer</text>
    <text x="460" y="299" class="layer-caption">Shared, local-first data foundation</text>

    <rect x="462" y="334" width="266" height="76" rx="18" class="box"/>
    <text x="486" y="366" class="card-title">Source Sync Runtime</text>
    <text x="486" y="391" class="card-text">Polling, resume, background sync</text>

    <rect x="462" y="437" width="266" height="76" rx="18" class="box"/>
    <text x="486" y="469" class="card-title">Canonical Glucose Store</text>
    <text x="486" y="494" class="card-text">Normalized readings and events</text>

    <rect x="462" y="540" width="266" height="76" rx="18" class="box"/>
    <text x="486" y="572" class="card-title">Settings &amp; Units</text>
    <text x="486" y="597" class="card-text">Target range, mg/dL, mmol/L</text>
  </g>

  <g class="font">
    <rect x="824" y="235" width="690" height="430" rx="24" class="layer"/>
    <text x="854" y="275" class="layer-title">Analysis Engine Layer</text>
    <text x="854" y="299" class="layer-caption">Refactored engines produce structured outputs before UI rendering</text>

    <rect x="856" y="334" width="190" height="96" rx="18" fill="url(#teal)" stroke="#B8DEC8" stroke-width="1.4" filter="url(#softShadow)"/>
    <text x="880" y="369" class="card-title">History Engine</text>
    <text x="880" y="394" class="card-text">Daily curve, events,</text>
    <text x="880" y="414" class="card-text">episode navigation</text>

    <rect x="1084" y="334" width="190" height="96" rx="18" fill="url(#teal)" stroke="#B8DEC8" stroke-width="1.4" filter="url(#softShadow)"/>
    <text x="1108" y="369" class="card-title">Stats Engine</text>
    <text x="1108" y="394" class="card-text">TIR, CV, AGP-style</text>
    <text x="1108" y="414" class="card-text">summaries</text>

    <rect x="1312" y="334" width="170" height="96" rx="18" fill="url(#teal)" stroke="#B8DEC8" stroke-width="1.4" filter="url(#softShadow)"/>
    <text x="1336" y="369" class="card-title">Insights</text>
    <text x="1336" y="394" class="card-text">Narrative facts</text>
    <text x="1336" y="414" class="card-text">and pattern text</text>

    <rect x="856" y="470" width="284" height="96" rx="18" fill="url(#amber)" stroke="#EAD19B" stroke-width="1.4" filter="url(#softShadow)"/>
    <text x="880" y="505" class="card-title">High Episode Engine</text>
    <text x="880" y="530" class="card-text">Duration, peak, recovery, context</text>
    <text x="880" y="550" class="card-text">for hyperglycemia review</text>

    <rect x="1178" y="470" width="304" height="96" rx="18" fill="url(#amber)" stroke="#EAD19B" stroke-width="1.4" filter="url(#softShadow)"/>
    <text x="1202" y="505" class="card-title">Low Episode Engine</text>
    <text x="1202" y="530" class="card-text">Duration, nadir, recovery, context</text>
    <text x="1202" y="550" class="card-text">for hypoglycemia review</text>

    <rect x="856" y="600" width="626" height="36" rx="18" fill="#FFFFFF" stroke="#D9E9E0" stroke-width="1.2"/>
    <text x="882" y="623" class="tiny">Engine output is mapped into view models, report sections, text templates, and shared UI components.</text>
  </g>

  <g class="font">
    <rect x="86" y="735" width="1428" height="255" rx="24" class="layer"/>
    <text x="116" y="775" class="layer-title">Host App + Public Plugins</text>
    <text x="116" y="799" class="layer-caption">The public repository exposes only the current v0.4.0 community preview scope</text>

    <rect x="116" y="835" width="160" height="74" rx="18" class="box"/>
    <text x="144" y="869" class="card-title">Home</text>
    <text x="144" y="893" class="card-text">Current glucose view</text>

    <rect x="306" y="835" width="160" height="74" rx="18" class="box"/>
    <text x="334" y="869" class="card-title">History</text>
    <text x="334" y="893" class="card-text">Daily review</text>

    <rect x="496" y="835" width="160" height="74" rx="18" class="box"/>
    <text x="524" y="869" class="card-title">Stats</text>
    <text x="524" y="893" class="card-text">Metrics and AGP</text>

    <rect x="686" y="835" width="160" height="74" rx="18" class="box"/>
    <text x="714" y="869" class="card-title">Insights</text>
    <text x="714" y="893" class="card-text">Readable patterns</text>

    <rect x="876" y="835" width="160" height="74" rx="18" class="box"/>
    <text x="904" y="869" class="card-title">High / Low</text>
    <text x="904" y="893" class="card-text">Episode review</text>

    <rect x="1066" y="835" width="160" height="74" rx="18" class="box"/>
    <text x="1094" y="869" class="card-title">Glance</text>
    <text x="1094" y="893" class="card-text">Widgets + float</text>

    <rect x="1256" y="835" width="210" height="74" rx="18" class="box"/>
    <text x="1284" y="869" class="card-title">Local Alerts</text>
    <text x="1284" y="893" class="card-text">Helper alerts, not primary CGM alerts</text>

    <rect x="116" y="934" width="1350" height="32" rx="16" fill="#F2FBF6" stroke="#D1E9DA" stroke-width="1"/>
    <text x="140" y="955" class="tiny">Boundary: Solgo Insight is a companion app. It does not replace xDrip+, Nightscout, CGM manufacturer apps, pump systems, or medical alert workflows.</text>
  </g>

  <g>
    <path d="M336 379 C386 379, 405 372, 462 372" class="line"/>
    <path d="M336 499 C388 499, 405 475, 462 475" class="line"/>
    <path d="M728 372 C780 372, 800 382, 856 382" class="line"/>
    <path d="M728 475 C790 475, 810 518, 856 518" class="line"/>
    <path d="M728 578 C790 578, 806 518, 856 518" class="line-soft"/>
    <path d="M951 430 C936 525, 690 696, 386 835" class="line-soft"/>
    <path d="M1179 430 C1090 602, 1024 718, 576 835" class="line-soft"/>
    <path d="M1397 430 C1345 642, 1050 748, 766 835" class="line-soft"/>
    <path d="M998 566 C1007 650, 1010 742, 956 835" class="line-soft"/>
    <path d="M1330 566 C1260 692, 1180 765, 956 835" class="line-soft"/>
    <path d="M595 616 C595 690, 595 756, 595 835" class="line"/>
  </g>

  <g class="font">
    <rect x="1188" y="214" width="326" height="38" rx="19" fill="#FFFFFF" stroke="#DDEAE3" stroke-width="1"/>
    <circle cx="1212" cy="233" r="7" fill="#49CC7B"/>
    <text x="1228" y="238" class="tiny">Refactored in this update: analysis engines and episode review flow</text>
  </g>
</svg>
