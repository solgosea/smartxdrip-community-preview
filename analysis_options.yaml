include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - "lib/plugins/explore/glucose_music/test/**"
    - "lib/plugins/explore/glucose_music/tool/**"
    - "lib/plugins/explore/glucose_music/web/**"
  errors:
    deprecated_member_use: ignore
    prefer_const_constructors: ignore
    prefer_const_declarations: ignore
    prefer_const_literals_to_create_immutables: ignore
    prefer_final_locals: ignore

linter:
  rules:
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_locals: true
    sort_child_properties_last: true
    use_key_in_widget_constructors: true
